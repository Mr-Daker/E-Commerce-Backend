groups:
  - name: shopping-application
    rules:
      - alert: ServiceDown
        expr: up{job="shopping-services"} == 0
        for: 1m
        labels: { severity: critical }
        annotations:
          summary: "Shopping service unavailable"
          description: "{{ $labels.instance }} has been unreachable for over one minute."
      - alert: HighServerErrorRate
        expr: sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m])) / clamp_min(sum(rate(http_server_requests_seconds_count[5m])), 1) > 0.05
        for: 5m
        labels: { severity: warning }
        annotations: { summary: "HTTP 5xx rate exceeds 5%" }
