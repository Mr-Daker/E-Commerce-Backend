spring.application.name=api-gateway
server.port=9003
app.security.username=${SHOP_API_USERNAME:shop-user}
app.security.password=${SHOP_API_PASSWORD:change-me}
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}

spring.cloud.gateway.default-filters[0].name=RequestSize
spring.cloud.gateway.default-filters[0].args.maxSize=${GATEWAY_MAX_REQUEST_SIZE:1MB}
spring.cloud.gateway.default-filters[1].name=RequestRateLimiter
spring.cloud.gateway.default-filters[1].args.key-resolver=#{@userKeyResolver}
spring.cloud.gateway.default-filters[1].args.redis-rate-limiter.replenishRate=${GATEWAY_RATE_PER_SECOND:20}
spring.cloud.gateway.default-filters[1].args.redis-rate-limiter.burstCapacity=${GATEWAY_BURST_CAPACITY:40}
spring.cloud.gateway.default-filters[1].args.redis-rate-limiter.requestedTokens=1

eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:9004/eureka}

spring.cloud.gateway.routes[0].id=product-service
spring.cloud.gateway.routes[0].uri=lb://product-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/product/**
spring.cloud.gateway.routes[0].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[0].filters[0].args.name=product-service
spring.cloud.gateway.routes[0].filters[0].args.fallbackUri=forward:/fallback/product-service

spring.cloud.gateway.routes[1].id=order-service
spring.cloud.gateway.routes[1].uri=lb://order-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/order/**
spring.cloud.gateway.routes[1].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[1].filters[0].args.name=order-service
spring.cloud.gateway.routes[1].filters[0].args.fallbackUri=forward:/fallback/order-service

spring.cloud.gateway.routes[2].id=inventory-service
spring.cloud.gateway.routes[2].uri=lb://inventory-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/inventory/**
spring.cloud.gateway.routes[2].predicates[1]=Method=GET
spring.cloud.gateway.routes[2].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[2].filters[0].args.name=inventory-service
spring.cloud.gateway.routes[2].filters[0].args.fallbackUri=forward:/fallback/inventory-service

spring.cloud.gateway.routes[3].id=notification-service
spring.cloud.gateway.routes[3].uri=lb://notification-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/notification/**
spring.cloud.gateway.routes[3].predicates[1]=Method=GET,PATCH,PUT
spring.cloud.gateway.routes[3].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[3].filters[0].args.name=notification-service
spring.cloud.gateway.routes[3].filters[0].args.fallbackUri=forward:/fallback/notification-service

spring.cloud.gateway.routes[4].id=cart-service
spring.cloud.gateway.routes[4].uri=lb://cart-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/cart/**
spring.cloud.gateway.routes[4].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[4].filters[0].args.name=cart-service
spring.cloud.gateway.routes[4].filters[0].args.fallbackUri=forward:/fallback/cart-service

spring.cloud.gateway.routes[5].id=checkout-service
spring.cloud.gateway.routes[5].uri=lb://checkout-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/checkout/**
spring.cloud.gateway.routes[5].predicates[1]=Method=POST
spring.cloud.gateway.routes[5].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[5].filters[0].args.name=checkout-service
spring.cloud.gateway.routes[5].filters[0].args.fallbackUri=forward:/fallback/checkout-service

management.endpoints.web.exposure.include=health,info,gateway,prometheus
management.endpoint.health.show-details=always
