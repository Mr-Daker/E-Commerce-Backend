spring.application.name=order-service
server.port=9001
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${ORDER_DB_URL:jdbc:mysql://localhost:3306/order-service}
spring.datasource.username=${MYSQL_USERNAME:root}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:9004/eureka}
inventory.client.timeout-ms=${INVENTORY_CLIENT_TIMEOUT_MS:3000}
inventory.client.retry-attempts=${INVENTORY_CLIENT_RETRY_ATTEMPTS:2}
order.compensation.retry-delay-ms=${ORDER_COMPENSATION_RETRY_DELAY_MS:30000}
order.pending.max-age-ms=${ORDER_PENDING_MAX_AGE_MS:300000}
inventory.service.url=${INVENTORY_SERVICE_URL:http://inventory-service}
product.service.url=${PRODUCT_SERVICE_URL:http://product-service}
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.publisher-confirm-type=correlated
spring.rabbitmq.publisher-returns=true
order.events.exchange=${ORDER_EVENTS_EXCHANGE:shopping.events}
order.events.queue=${ORDER_EVENTS_QUEUE:shopping.order-events}
order.events.dead-letter-exchange=${ORDER_EVENTS_DLX:shopping.events.dlx}
order.events.dead-letter-queue=${ORDER_EVENTS_DLQ:shopping.order-events.dlq}
order.events.routing-key=${ORDER_EVENTS_ROUTING_KEY:order.event}
order.outbox.publish-delay-ms=${ORDER_OUTBOX_PUBLISH_DELAY_MS:1000}
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
