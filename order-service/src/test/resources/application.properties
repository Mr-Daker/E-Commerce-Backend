eureka.client.enabled=false
spring.cloud.discovery.enabled=false
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:order-service-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.rabbitmq.dynamic=false
order.events.exchange=shopping.events.test
order.events.queue=shopping.order-events.test
order.events.dead-letter-exchange=shopping.events.dlx.test
order.events.dead-letter-queue=shopping.order-events.dlq.test
order.events.routing-key=order.event
order.outbox.publish-delay-ms=600000
