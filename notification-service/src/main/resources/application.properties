spring.application.name=notification-service
server.port=9005
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${NOTIFICATION_DB_URL:jdbc:mysql://localhost:3306/notificationservice}
spring.datasource.username=${MYSQL_USERNAME:root}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.initial-interval=500ms
spring.rabbitmq.listener.simple.default-requeue-rejected=false
order.events.exchange=${ORDER_EVENTS_EXCHANGE:shopping.events}
order.events.queue=${ORDER_EVENTS_QUEUE:shopping.order-events}
order.events.dead-letter-exchange=${ORDER_EVENTS_DLX:shopping.events.dlx}
order.events.dead-letter-queue=${ORDER_EVENTS_DLQ:shopping.order-events.dlq}
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:9004/eureka}
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
